<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú Militar</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #2f3e2f; /* verde oscuro */
        }

        /* Encabezado */
        header {
            background-color: #1b2a1b; /* verde militar oscuro */
            color: #e0e0d1; /* beige militar */
            padding: 20px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* Menú */
        nav {
            background-color: #3a4f3a; /* verde oliva */
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        nav ul li a {
            display: block;
            padding: 15px 30px;
            color: #f0f0dc; /* tono arena */
            text-decoration: none;
            font-size: 18px;
            text-transform: uppercase;
        }

        nav ul li a:hover {
            background-color: #556b2f; /* verde oliva oscuro */
        }

        /* Contenido */
        main {
            padding: 30px;
            text-align: center;
            color: #e6e6cc;
        }
    </style>
</head>
<body>

    <header>
        Angel Hidalgo
    </header>

    <nav>
        <ul>
            <li><a href="#redes">Redes</a></li>
            <li><a href="#soporte">Soporte</a></li>
            <li><a href="#analisis">Análisis</a></li>
        </ul>
    </nav>

    <main>
        <h2>Bienvenidos</h2>
        <p>Selecciona una opción del menú de navegación.</p>
    </main>

</body>
</html>
